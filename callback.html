<!DOCTYPE html><html><head><meta charset="UTF-8"><title>登录中...</title>
<style>body{background:#08080c;color:#fff;display:flex;align-items:center;justify-content:center;height:100vh;font-family:sans-serif;}</style>
</head><body><div id="msg">⏳ 正在登录...</div>
<script src="js/seedstudio-auth.js"></script>
<script>
(async function(){
  var p=new URLSearchParams(window.location.search);
  var code=p.get('code'),state=p.get('state'),error=p.get('error');
  if(error){document.getElementById('msg').textContent='❌ 登录失败: '+error;return;}
  if(!code){document.getElementById('msg').textContent='❌ 缺少授权码';return;}

  var result=await SeedStudioAccount.handleCallback(code,state);
  if(result&&result.error){
    document.getElementById('msg').textContent='❌ '+result.error;
  }else{
    document.getElementById('msg').textContent='✅ 登录成功！3秒后跳转...';
    // Store the data back to main page
    setTimeout(function(){window.location.href='https://www.seedstudio.top';},1500);
  }
})();
</script>
</body></html>
