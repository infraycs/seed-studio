name: Auto-License
on:
  schedule: [{cron: '*/5 * * * *'}]
  workflow_dispatch:

jobs:
  gen:
    runs-on: ubuntu-latest
    permissions: {contents: write}
    steps:
      - uses: actions/checkout@v4
      - name: Check 爱发电 → generate keys
        env:
          UID: '5741d9da011b11efb33152540025c377'
          TOKEN: 'WJaK3djBgPCtX8xsYmVeG5kQAn7TDfMN'
        run: node -e "
          const crypto=require('crypto'),fs=require('fs');
          const uid=process.env.UID,token=process.env.TOKEN;
          const ts=Math.floor(Date.now()/1000);
          const params=JSON.stringify({page:1,per_page:10});
          const signStr=token+'params'+params+'ts'+ts+'user_id'+uid;
          const sign=crypto.createHash('md5').update(signStr).digest('hex');
          const body=JSON.stringify({user_id:uid,params,ts,sign});
          fetch('https://afdian.net/api/open/query-order',{method:'POST',headers:{'Content-Type':'application/json'},body})
            .then(r=>r.json()).then(data=>{
              if(data.ec!==200||!data.data||!data.data.list){console.log('No orders');process.exit(0);}
              const kf='js/valid-keys.json';
              let keys={};try{keys=JSON.parse(fs.readFileSync(kf,'utf8'));}catch(e){}
              let changed=false;
              data.data.list.forEach(o=>{
                if(o.status===2&&!keys[o.out_trade_no]){
                  const key='PRO-'+crypto.randomBytes(4).toString('hex').toUpperCase();
                  keys[o.out_trade_no]={key:key,time:o.create_time};
                  console.log('NEW KEY:',key);
                  changed=true;
                }
              });
              if(changed){fs.writeFileSync(kf,JSON.stringify(keys,null,2));console.log('Saved');}
              else console.log('No new keys');
            }).catch(e=>{console.error(e.message);process.exit(1);});
        "
      - name: Commit & push
        run: |
          git config user.name "SeedBot"
          git config user.email "bot@seedstudio.top"
          git add js/valid-keys.json
          if git diff --cached --quiet; then echo "No changes"; else git commit -m "🔑 auto keys [skip ci]" && git push; fi
