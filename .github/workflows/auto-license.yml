name: Auto-License
on:
  schedule: [{cron: '*/5 * * * *'}]
  workflow_dispatch:

jobs:
  gen:
    runs-on: ubuntu-latest
    permissions: {contents: write}
    steps:
      - uses: actions/checkout@v4
      - uses: actions/setup-node@v4
        with: {node-version: '22'}
      - name: Check 爱发电 & generate keys
        run: node .github/scripts/gen-keys.mjs
      - name: Commit & push
        run: |
          git config user.name "SeedBot"
          git config user.email "bot@seedstudio.top"
          git add js/valid-keys.json
          if git diff --cached --quiet; then echo "No changes"; else git commit -m "🔑 auto keys [skip ci]" && git push; fi
