name: Auto-License Generator
# Every 5 minutes, checks 爱发电 for new payments, generates license keys

on:
  schedule:
    - cron: '*/5 * * * *'
  workflow_dispatch:

jobs:
  generate:
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v4

      - name: Check 爱发电 orders & generate keys
        run: |
          # Call 爱发电 API
          TIMESTAMP=$(date +%s)
          USER_ID="5741d9da011b11efb33152540025c377"
          TOKEN="WJaK3djBgPCtX8xsYmVeG5kQAn7TDfMN"
          PARAMS='{"page":1,"per_page":10}'
          SIGN_STR="${TOKEN}params${PARAMS}ts${TIMESTAMP}user_id${USER_ID}"
          SIGN=$(echo -n "$SIGN_STR" | md5sum | cut -d' ' -f1)

          RESPONSE=$(curl -s -X POST "https://afdian.net/api/open/query-order" \
            -H "Content-Type: application/json" \
            -d "{\"user_id\":\"$USER_ID\",\"params\":$PARAMS,\"ts\":$TIMESTAMP,\"sign\":\"$SIGN\"}")

          echo "$RESPONSE" > /tmp/orders.json

          # Read existing keys
          KEYS_FILE="js/valid-keys.json"
          if [ ! -f "$KEYS_FILE" ]; then echo '{"keys":{}}' > "$KEYS_FILE"; fi

          # Process paid orders and generate keys
          node -e "
          const fs=require('fs');
          const crypto=require('crypto');
          const orders=JSON.parse(fs.readFileSync('/tmp/orders.json','utf8'));
          const keys=JSON.parse(fs.readFileSync('$KEYS_FILE','utf8'));

          if(orders.ec!==200||!orders.data||!orders.data.list) process.exit(0);

          let changed=false;
          orders.data.list.forEach(o=>{
            if(o.status===2 && !keys.keys[o.out_trade_no]){
              // Generate license key
              const key='SEED-PRO-'+crypto.randomBytes(4).toString('hex').toUpperCase();
              const hash=crypto.createHash('sha256').update(key).digest('hex');
              keys.keys[o.out_trade_no]={key:key,hash:hash,amount:o.total_amount,time:o.create_time};
              console.log('NEW KEY:',key,'for order',o.out_trade_no,'¥'+o.total_amount);
              changed=true;
            }
          });

          if(changed) fs.writeFileSync('$KEYS_FILE',JSON.stringify(keys,null,2));
          " 2>&1

      - name: Commit & push new keys
        run: |
          if git diff --quiet js/valid-keys.json; then
            echo "No new keys"
          else
            git config user.name "Seed Studio Bot"
            git config user.email "bot@seedstudio.top"
            git add js/valid-keys.json
            git commit -m "🔑 Auto-generated license keys [skip ci]"
            git push
            echo "New keys committed!"
          fi
